services:

  db:
    container_name: pg_airlines
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     airlines
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       airlines_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airlines -d airlines_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin_airlines
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@airlines.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  mongo:
    container_name: mongo_airlines
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    container_name: mongo_express_airlines
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH:      false
    depends_on:
      mongo:
        condition: service_healthy

  neo4j:
    container_name: neo4j_airlines
    image: neo4j:5
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH:                    neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS:                 '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    container_name: airlines_api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://airlines:${POSTGRES_PASSWORD}@db:5432/airlines_db
      MONGO_URL:    mongodb://mongo:27017/
      NEO4J_URL:    bolt://neo4j:7687
      NEO4J_USER:   neo4j
      NEO4J_PASS:   ${NEO4J_PASSWORD}
      MODEL_PATH:   /app/logistic_regression.pkl
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    container_name: airlines_dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8050:8050"
    environment:
      API_URL:      http://api:8000
      DATABASE_URL: postgresql+psycopg2://airlines:${POSTGRES_PASSWORD}@db:5432/airlines_db
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  pg_data:
  mongo_data:
  neo4j_data: